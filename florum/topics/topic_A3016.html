<script>
(function(){
  var c=document.getElementById('posts');
  var ba=document.getElementById('btn-asc');
  var bd=document.getElementById('btn-desc');
  function sort(dir){
    var ps=Array.from(c.querySelectorAll('.post'));
    ps.sort(function(a,b){var ta=a.dataset.ts,tb=b.dataset.ts;
      return dir==='asc'?ta.localeCompare(tb):tb.localeCompare(ta);});
    ps.forEach(function(p){c.appendChild(p);});
    ba.classList.toggle('active',dir==='asc');
    bd.classList.toggle('active',dir==='desc');
  }
  ba.addEventListener('click',function(){sort('asc');});
  bd.addEventListener('click',function(){sort('desc');});
})();
