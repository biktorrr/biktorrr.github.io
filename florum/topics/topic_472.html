<script>
(function(){
  var container=document.getElementById('posts');
  var btnAsc=document.getElementById('btn-asc');
  var btnDesc=document.getElementById('btn-desc');
  function sortPosts(dir){
    var posts=Array.from(container.querySelectorAll('.post'));
    posts.sort(function(a,b){
      var ta=a.dataset.ts,tb=b.dataset.ts;
      return dir==='asc'?ta.localeCompare(tb):tb.localeCompare(ta);
    });
    posts.forEach(function(p){container.appendChild(p);});
    btnAsc.classList.toggle('active',dir==='asc');
    btnDesc.classList.toggle('active',dir==='desc');
  }
  btnAsc.addEventListener('click',function(){sortPosts('asc');});
  btnDesc.addEventListener('click',function(){sortPosts('desc');});
})();
</script>
